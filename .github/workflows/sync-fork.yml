name: Sync fork with upstream

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync master from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp .github/workflows/sync-fork.yml /tmp/sync-fork.yml

          git remote add upstream https://github.com/Reserve-Station/Reserve-Station.git
          git fetch upstream master
          git checkout master
          git reset --hard upstream/master

          mkdir -p .github/workflows
          cp /tmp/sync-fork.yml .github/workflows/sync-fork.yml
          git add .github/workflows/sync-fork.yml
          git diff --staged --quiet || git commit -m "chore: restore fork sync workflow"

          git push --force-with-lease origin master
